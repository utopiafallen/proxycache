<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxycache Monitor</title>
<style>
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #e0e0e0;
  --green: #2e7d32;
  --green-bg: #e8f5e9;
  --red: #c62828;
  --red-bg: #ffebee;
  --yellow: #f57f17;
  --yellow-bg: #fff8e1;
  --blue: #1565c0;
  --blue-bg: #e3f2fd;
  --gray: #9e9e9e;
  --gray-bg: #fafafa;
  --accent: #0d47a1;
  --mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --text-secondary: #aaa;
    --border: #2a2a4a;
    --green: #66bb6a;
    --green-bg: #1b3a1b;
    --red: #ef5350;
    --red-bg: #3a1b1b;
    --yellow: #ffca28;
    --yellow-bg: #3a3a1b;
    --blue: #42a5f5;
    --blue-bg: #1b2a3a;
    --gray: #777;
    --gray-bg: #1a1a2e;
    --accent: #64b5f6;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  padding: 16px;
  font-size: 14px;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 20px; font-weight: 600; }
header .controls { display: flex; align-items: center; gap: 12px; }
header .controls label { font-size: 13px; color: var(--text-secondary); }
header .controls select, header .controls button {
  font-size: 13px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.panel-header h2 { font-size: 14px; font-weight: 600; }
.panel-header .toggle { font-size: 12px; color: var(--text-secondary); transition: transform 0.2s; }
.panel-header .toggle.collapsed { transform: rotate(-90deg); }
.panel-body { padding: 12px 14px; }
.panel-body.collapsed { display: none; }

/* Backend Health */
.backend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.backend-item:last-child { border-bottom: none; }
.backend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.backend-dot.up { background: var(--green); }
.backend-dot.down { background: var(--red); }
.backend-dot.warning { background: var(--yellow); }
.backend-name { font-family: var(--mono); font-size: 13px; flex: 1; }
.backend-status { font-size: 12px; color: var(--text-secondary); }
.backend-models { font-size: 12px; color: var(--text-secondary); margin-left: 18px; }

/* Performance */
.perf-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}
.perf-label { font-size: 13px; color: var(--text-secondary); }
.perf-bar-container {
  flex: 1;
  margin: 0 12px;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.perf-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.perf-bar.green, .cache-bar-fill.green { background: var(--green); }
.perf-bar.yellow, .cache-bar-fill.yellow { background: var(--yellow); }
.perf-bar.red, .cache-bar-fill.red { background: var(--red); }
.perf-value { font-family: var(--mono); font-size: 13px; min-width: 60px; text-align: right; }
.latency-stats {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-secondary);
}

/* Cache Utilization */
.cache-bar-container {
  margin-bottom: 12px;
}
.cache-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 4px;
}
.cache-bar {
  display: flex;
  height: 12px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.cache-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s ease;
  flex-shrink: 0;
}
.cache-backend {
  font-size: 12px;
  color: var(--text-secondary);
  padding: 2px 0;
}

/* Slot Status */
.slot-model-header {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-secondary);
}
.slot-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.slot-cell {
  width: 32px; height: 24px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: var(--mono);
  cursor: default;
  position: relative;
}
.slot-cell.in-use { background: var(--green); color: white; }
.slot-cell.free { background: var(--gray-bg); color: var(--gray); border: 1px solid var(--border); }
.slot-cell.restoring { background: var(--blue); color: white; }
.slot-cell:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}
.slot-legend {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text-secondary);
}
.slot-legend span { display: flex; align-items: center; gap: 4px; }
.slot-legend .swatch {
  width: 12px; height: 12px;
  border-radius: 2px;
  display: inline-block;
}

/* Requests */
.requests-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.requests-filter button {
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}
.requests-filter button.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.request-item {
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 6px;
  overflow: hidden;
}
.request-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--mono);
}
.request-header:hover { background: var(--bg); }
.request-expand { font-size: 10px; color: var(--text-secondary); transition: transform 0.2s; }
.request-expand.open { transform: rotate(90deg); }
.request-time { color: var(--text-secondary); }
.request-model { font-weight: 600; }
.request-backend { color: var(--text-secondary); }
.request-slot { color: var(--accent); }
.request-badge {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 600;
}
.request-badge.hit { background: var(--green-bg); color: var(--green); }
.request-badge.miss { background: var(--yellow-bg); color: var(--yellow); }
.request-badge.recompute { background: var(--red-bg); color: var(--red); }
.request-latency { color: var(--text-secondary); margin-left: auto; }
.request-body {
  display: none;
  padding: 8px 10px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 12px;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
}
.request-body.open { display: block; }
.request-preview {
  padding: 4px 10px;
  font-size: 12px;
  color: var(--text-secondary);
  font-style: italic;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.show-all-btn {
  display: block;
  width: 100%;
  padding: 8px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  margin-top: 8px;
}
.show-all-btn:hover { background: var(--bg); }

/* Full width panel */
.panel.full-width { grid-column: 1 / -1; }

/* Responsive */
@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>Proxycache Monitor</h1>
  <div class="controls">
    <label>Refresh:
      <select id="refreshInterval">
        <option value="2">2s</option>
        <option value="5" selected>5s</option>
        <option value="10">10s</option>
        <option value="30">30s</option>
      </select>
    </label>
    <button id="darkModeToggle">Toggle Dark</button>
  </div>
</header>

<div class="grid">
  <!-- Backend Health -->
  <div class="panel">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>Backend Health</h2>
      <span class="toggle">&#9660;</span>
    </div>
    <div class="panel-body" id="backendHealth"></div>
  </div>

  <!-- Cache Performance -->
  <div class="panel">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>Cache Performance</h2>
      <span class="toggle">&#9660;</span>
    </div>
    <div class="panel-body" id="cachePerformance"></div>
  </div>

  <!-- Cache Utilization -->
  <div class="panel">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>Cache Utilization</h2>
      <span class="toggle">&#9660;</span>
    </div>
    <div class="panel-body" id="cacheUtilization"></div>
  </div>

  <!-- Slot Status -->
  <div class="panel">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>Slot Status</h2>
      <span class="toggle">&#9660;</span>
    </div>
    <div class="panel-body" id="slotStatus"></div>
  </div>

  <!-- Recent Requests -->
  <div class="panel full-width">
    <div class="panel-header" onclick="togglePanel(this)">
      <h2>Recent Requests</h2>
      <span class="toggle">&#9660;</span>
    </div>
    <div class="panel-body" id="recentRequests">
      <div class="requests-filter">
        <button class="active" onclick="setFilter('all', this)">All</button>
        <button onclick="setFilter('hit', this)">Hits</button>
        <button onclick="setFilter('miss', this)">Misses</button>
        <button onclick="setFilter('recompute', this)">Recomputes</button>
        <select id="backendFilter" style="margin-left:auto;padding:4px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);">
          <option value="">All backends</option>
        </select>
      </div>
      <div id="requestsList"></div>
      <button class="show-all-btn" id="showAllBtn" onclick="showAllRequests()">Show all 100</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '';
let refreshTimer = null;
let currentFilter = 'all';
let currentBackendFilter = '';
let allRequests = [];
let expandedRequests = new Set();

function togglePanel(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.toggle');
  body.classList.toggle('collapsed');
  toggle.classList.toggle('collapsed');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.requests-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRequests();
}

function formatTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString();
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0;
  while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
  return bytes.toFixed(1) + ' ' + units[i];
}

function getBarColor(value) {
  if (value >= 0.8) return 'green';
  if (value >= 0.6) return 'yellow';
  return 'red';
}

function getBarPct(value) {
  return Math.min(100, Math.max(0, value * 100));
}

async function fetchMetrics() {
  try {
    const resp = await fetch(API_BASE + '/metrics/summary');
    if (!resp.ok) return;
    const data = await resp.json();
    renderBackendHealth(data.backends || {});
    renderCachePerformance(data.performance || {});
    renderCacheUtilization(data.cache || {});
    renderSlotStatus(data.slots || {});
    renderRequests(data.requests || [], data.requests_summary?.length || 0);
    updateBackendFilter(data.backends || {});
  } catch (e) {
    console.error('Failed to fetch metrics:', e);
  }
}

function updateBackendFilter(backends) {
  const sel = document.getElementById('backendFilter');
  const current = sel.value;
  const options = ['<option value="">All</option>'];
  for (const key of Object.keys(backends)) {
    options.push(`<option value="${key}" ${key === current ? 'selected' : ''}>${key}</option>`);
  }
  sel.innerHTML = options.join('');
}

function renderBackendHealth(backends) {
  const el = document.getElementById('backendHealth');
  if (!Object.keys(backends).length) {
    el.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">No backends configured</p>';
    return;
  }
  let html = '';
  for (const [key, info] of Object.entries(backends)) {
    const uptime = info.up ? 'UP' : 'DOWN';
    const dotClass = info.up ? 'up' : 'down';
    const lastDiscovery = info.models ? Object.values(info.models)[0]?.last_discovered : 0;
    const now = Date.now() / 1000;
    if (info.up && lastDiscovery && (now - lastDiscovery) > 300) {
      dotClass = 'warning';
    }
    html += `<div class="backend-item">
      <span class="backend-dot ${dotClass}"></span>
      <span class="backend-name">${key}</span>
      <span class="backend-status">${uptime}</span>
    </div>`;
    if (info.models) {
      for (const [modelName, modelInfo] of Object.entries(info.models)) {
        html += `<div class="backend-models">
          ${modelName} | ${modelInfo.total_slots} slots (${modelInfo.in_use} in use), n_ctx=${modelInfo.n_ctx}
        </div>`;
      }
    }
  }
  el.innerHTML = html;
}

function renderCachePerformance(perf) {
  const el = document.getElementById('cachePerformance');
  const g = perf.global || {};
  if (!g.total_requests) {
    el.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">No requests yet</p>';
    return;
  }
  const rows = [
    ['Hit Rate', g.cache_hit_rate, 'green'],
    ['Mispredict Rate', g.cache_mispredict_rate, 'red'],
    ['Utility Rate', g.cache_utility_rate, 'green'],
    ['Save Rate', g.save_rate, 'yellow'],
    ['Restore OK', g.restore_success_rate, 'green'],
  ];
  let html = '';
  for (const [label, value, color] of rows) {
    const pct = getBarPct(value);
    html += `<div class="perf-row">
      <span class="perf-label">${label}</span>
      <div class="perf-bar-container">
        <div class="perf-bar ${color}" style="width:${pct}%"></div>
      </div>
      <span class="perf-value">${(value * 100).toFixed(1)}%</span>
    </div>`;
  }
  const lat = g.latency || {};
  html += `<div class="latency-stats">
    avg=${lat.avg_ms}ms &nbsp; p50=${lat.p50_ms}ms &nbsp; p95=${lat.p95_ms}ms &nbsp; p99=${lat.p99_ms}ms
  </div>`;
  el.innerHTML = html;
}

function renderCacheUtilization(cache) {
  const el = document.getElementById('cacheUtilization');
  if (!Object.keys(cache).length) {
    el.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">No cache data</p>';
    return;
  }
  let html = '';
  for (const [key, info] of Object.entries(cache)) {
    const color = getBarColor(info.utilization_pct / 100);
    let label = `${key} &middot; ${info.ring_size} files`;
    if (info.cache_dir) label += ` &middot; ${info.cache_dir}`;
    html += `<div class="cache-bar-container">
      <div class="cache-bar-label">
        <span>${label}</span>
        <span>${info.total_gb} / ${info.max_gb} GB (${info.utilization_pct}%)</span>
      </div>
      <div class="cache-bar">
        <div class="cache-bar-fill ${color}" style="width:${Math.min(100, info.utilization_pct)}%"></div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderSlotStatus(slots) {
  const el = document.getElementById('slotStatus');
  if (!Object.keys(slots).length) {
    el.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">No slot data</p>';
    return;
  }
  let html = '';
  const now = Date.now() / 1000;
  for (const [backendId, backendData] of Object.entries(slots)) {
    for (const [modelName, modelData] of Object.entries(backendData.models)) {
      html += `<div class="slot-model-header">${modelName} @ ${backendId}</div>`;
      html += '<div class="slot-grid">';
      for (const [slotId, slotInfo] of Object.entries(modelData.slots)) {
        let cls = 'free';
        if (slotInfo.in_use) cls = 'in-use';
        else if (slotInfo.last_restore && (now - slotInfo.last_used) < 5) cls = 'restoring';
        const tooltip = `S${slotId}: ${slotInfo.in_use ? 'in-use' : 'free'}, kv=${slotInfo.kv_blocks} blocks`;
        html += `<div class="slot-cell ${cls}" data-tooltip="${tooltip}">${slotId}</div>`;
      }
      html += '</div>';
    }
  }
  html += `<div class="slot-legend">
    <span><span class="swatch" style="background:var(--green)"></span> In-use</span>
    <span><span class="swatch" style="background:var(--gray-bg);border:1px solid var(--border)"></span> Free</span>
    <span><span class="swatch" style="background:var(--blue)"></span> Restoring</span>
  </div>`;
  el.innerHTML = html;
}

function renderRequests(requests, total) {
  allRequests = requests;
  renderFilteredRequests();
  document.getElementById('showAllBtn').textContent = `Show all ${total}`;
}

function renderFilteredRequests() {
  const el = document.getElementById('requestsList');
  let filtered = allRequests;
  if (currentBackendFilter) {
    filtered = filtered.filter(r => r.backend === currentBackendFilter);
  }
  if (currentFilter === 'hit') {
    filtered = filtered.filter(r => r.cache_hit && !r.recompute);
  } else if (currentFilter === 'miss') {
    filtered = filtered.filter(r => !r.cache_hit);
  } else if (currentFilter === 'recompute') {
    filtered = filtered.filter(r => r.recompute);
  }
  if (!filtered.length) {
    el.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">No matching requests</p>';
    return;
  }
  // Reverse to show newest first
  filtered = [...filtered].reverse();
  let html = '';
  for (const req of filtered) {
    const badgeClass = req.recompute ? 'recompute' : (req.cache_hit ? 'hit' : 'miss');
    const badgeText = req.recompute ? 'RECOMPUTE' : (req.cache_hit ? 'HIT' : 'MISS');
    const expanded = expandedRequests.has(req.timestamp) ? 'open' : '';
    const bodyOpen = expanded ? 'open' : '';
    const arrowOpen = expanded ? 'open' : '';
    const preview = req.prompt_preview ? `<div class="request-preview">"${req.prompt_preview}${req.prompt_preview.length >= 200 ? '...' : ''}"</div>` : '';
    const metricsParts = [];
    if (req.n_tokens) metricsParts.push(`${req.n_tokens} tokens`);
    if (req.cache_size_bytes) metricsParts.push(formatBytes(req.cache_size_bytes));
    if (req.restored) metricsParts.push('restored');
    if (req.saved) metricsParts.push('saved');
    const metricsHtml = metricsParts.length ? `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">${metricsParts.join(' &middot; ')}</div>` : '';
    const fullJson = req.full_request_json ? `<pre>${JSON.stringify(req.full_request_json, null, 2)}</pre>` : '<p style="color:var(--text-secondary);font-size:12px;">No request body available</p>';
    html += `<div class="request-item">
      <div class="request-header" onclick="toggleRequest(${req.timestamp})">
        <span class="request-expand ${arrowOpen}">&#9654;</span>
        <span class="request-time">${formatTime(req.timestamp)}</span>
        <span class="request-model">${req.model}</span>
        <span class="request-backend">${req.backend}</span>
        <span class="request-slot">S${req.slot_id}</span>
        <span class="request-badge ${badgeClass}">${badgeText}</span>
        <span class="request-latency">${req.latency_ms.toFixed(0)}ms</span>
      </div>
      ${preview}
      <div class="request-body ${bodyOpen}">${metricsHtml}${fullJson}</div>
    </div>`;
  }
  el.innerHTML = html;
}

function toggleRequest(ts) {
  if (expandedRequests.has(ts)) {
    expandedRequests.delete(ts);
  } else {
    expandedRequests.add(ts);
  }
  renderFilteredRequests();
}

function showAllRequests() {
  // Fetch all requests from API
  fetch(API_BASE + '/metrics/requests?limit=100&offset=0')
    .then(r => r.json())
    .then(data => {
      allRequests = data.requests || [];
      renderFilteredRequests();
    });
}

// Dark mode toggle
document.getElementById('darkModeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
});

// Refresh interval
const savedRefresh = localStorage.getItem('proxycache_refresh_interval');
if (savedRefresh) {
  document.getElementById('refreshInterval').value = savedRefresh;
  startAutoRefresh(parseInt(savedRefresh) * 1000);
}
document.getElementById('refreshInterval').addEventListener('change', (e) => {
  const interval = parseInt(e.target.value) * 1000;
  localStorage.setItem('proxycache_refresh_interval', e.target.value);
  startAutoRefresh(interval);
});

document.getElementById('backendFilter').addEventListener('change', (e) => {
  currentBackendFilter = e.target.value;
  renderFilteredRequests();
});

function startAutoRefresh(interval) {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchMetrics, interval || 5000);
}

// Initial fetch and start auto-refresh
fetchMetrics();
startAutoRefresh(5000);
</script>
</body>
